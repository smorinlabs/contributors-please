name: Publish

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    environment: npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Cross-repo checkout of the action repo for the action-output
      # consistency check below. Here CONTRIBUTORS_PLEASE_ACTION_TOKEN is
      # read-only and optional — it falls back to github.token for public
      # checkouts. The SAME secret is reused write-capably by the
      # "Notify contributors-please-action of the release" step at the end of
      # this job, where it is required (contents: write, no fallback).
      - uses: actions/checkout@v6
        with:
          repository: smorinlabs/contributors-please-action
          path: contributors-please-action
          ref: ${{ vars.CONTRIBUTORS_PLEASE_ACTION_REF || 'main' }}
          token: ${{ secrets.CONTRIBUTORS_PLEASE_ACTION_TOKEN || github.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "v${PACKAGE_VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version v${PACKAGE_VERSION}" >&2
            exit 1
          fi

      - run: npm ci
      - run: npm test
      - run: npm run schema:codegen
      - run: git diff --exit-code -- src/types
      - run: npm run build
      - run: npm run check:dist-cli
      - run: npm run check:pack
      - run: npm run check:public-api-snapshot
      - run: npm run test:public-api
      - run: node scripts/check-action-outputs.mjs contributors-please-action
      - run: git diff --exit-code -- dist
      - run: npm publish

      - name: Notify contributors-please-action of the release
        # The action repo's engine-sync workflow reacts to this dispatch and
        # flags stale version references immediately instead of at its daily
        # cron. The npm publish above already succeeded (and the cron is a
        # backstop), but a failed notification is no longer silently swallowed:
        # scripts/notify-release.mjs prints the exact root cause as a `::error::`
        # annotation and exits non-zero, so this step turns red and is trivially
        # diagnosable. `continue-on-error` is intentionally NOT set.
        env:
          GH_TOKEN: ${{ secrets.CONTRIBUTORS_PLEASE_ACTION_TOKEN }}
        run: node scripts/notify-release.mjs
