name: Publish

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    environment: npm
    runs-on: ubuntu-latest
    env:
      RP_CLIENT_ID: ${{ secrets.RELEASE_PLEASE_CLIENT_ID }}
      RP_APP_ID: ${{ secrets.RELEASE_PLEASE_APP_ID }}
    steps:
      - uses: actions/checkout@v6

      - name: Mint contributors-please-action dispatch token (client-id)
        id: action-dispatch-token-client
        if: ${{ env.RP_CLIENT_ID != '' }}
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.RELEASE_PLEASE_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_PRIVATE_KEY }}
          owner: smorinlabs
          repositories: contributors-please-action

      - name: Mint contributors-please-action dispatch token (app-id, deprecated)
        id: action-dispatch-token-app
        if: ${{ env.RP_CLIENT_ID == '' && env.RP_APP_ID != '' }}
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_PRIVATE_KEY }}
          owner: smorinlabs
          repositories: contributors-please-action

      - uses: actions/checkout@v6
        with:
          repository: smorinlabs/contributors-please-action
          path: contributors-please-action
          ref: ${{ vars.CONTRIBUTORS_PLEASE_ACTION_REF || 'main' }}
          token: ${{ steps.action-dispatch-token-client.outputs.token || steps.action-dispatch-token-app.outputs.token || secrets.CONTRIBUTORS_PLEASE_ACTION_TOKEN || github.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "v${PACKAGE_VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version v${PACKAGE_VERSION}" >&2
            exit 1
          fi

      - run: npm ci
      - run: npm test
      - run: npm run schema:codegen
      - run: git diff --exit-code -- src/types
      - run: npm run build
      - run: npm run check:dist-cli
      - run: npm run check:pack
      - run: npm run check:public-api-snapshot
      - run: npm run test:public-api
      - run: node scripts/check-action-outputs.mjs contributors-please-action
      - run: git diff --exit-code -- dist

      - name: Require contributors-please-action dispatch token
        env:
          GH_TOKEN: ${{ steps.action-dispatch-token-client.outputs.token || steps.action-dispatch-token-app.outputs.token || secrets.CONTRIBUTORS_PLEASE_ACTION_TOKEN }}
        run: |
          set -euo pipefail
          test -n "${GH_TOKEN}"

      - run: npm publish

      - name: Notify contributors-please-action of the release
        # The action repo's engine-sync workflow reacts to this dispatch and
        # flags stale version references immediately instead of at its daily
        # cron. Missing credentials fail before npm publish; dispatch failures
        # after publish stay visible instead of silently falling back to cron.
        env:
          GH_TOKEN: ${{ steps.action-dispatch-token-client.outputs.token || steps.action-dispatch-token-app.outputs.token || secrets.CONTRIBUTORS_PLEASE_ACTION_TOKEN }}
        run: |
          set -euo pipefail
          test -n "${GH_TOKEN}"
          gh api --method POST repos/smorinlabs/contributors-please-action/dispatches \
            -f event_type=contributors-please-released \
            -f "client_payload[version]=${GITHUB_REF_NAME}"
