name: Publish

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    environment: npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: smorinlabs/contributors-please-action
          path: contributors-please-action
          ref: ${{ vars.CONTRIBUTORS_PLEASE_ACTION_REF || 'main' }}
          token: ${{ secrets.CONTRIBUTORS_PLEASE_ACTION_TOKEN || github.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "v${PACKAGE_VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version v${PACKAGE_VERSION}" >&2
            exit 1
          fi

      - run: npm ci
      - run: npm test
      - run: npm run schema:codegen
      - run: git diff --exit-code -- src/types
      - run: npm run build
      - run: npm run check:dist-cli
      - run: npm run check:pack
      - run: npm run check:public-api-snapshot
      - run: npm run test:public-api
      - run: node scripts/check-action-outputs.mjs contributors-please-action
      - run: git diff --exit-code -- dist
      - run: npm publish

      - name: Notify contributors-please-action of the release
        # The action repo's engine-sync workflow reacts to this dispatch and
        # flags stale version references immediately instead of at its daily
        # cron. Non-fatal: the publish already succeeded, and the cron is the
        # backstop if the dispatch token is missing or expired.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.CONTRIBUTORS_PLEASE_ACTION_TOKEN }}
        run: |
          set -euo pipefail
          test -n "${GH_TOKEN}"
          gh api --method POST repos/smorinlabs/contributors-please-action/dispatches \
            -f event_type=contributors-please-released \
            -f "client_payload[version]=${GITHUB_REF_NAME}"
