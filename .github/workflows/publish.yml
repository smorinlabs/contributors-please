name: Publish

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    environment: npm
    runs-on: ubuntu-latest
    env:
      # Surfaced so the mint step's `if:` can test it (secrets are not available
      # directly in `if:`). Empty on forks without the App configured.
      CP_APP_ID: ${{ secrets.CONTRIBUTORS_PLEASE_APP_ID }}
    steps:
      - uses: actions/checkout@v6

      # Mint a contributors-please App installation token scoped to the action
      # repo. The App is installed across the org with `contents: write`, so this
      # one token both checks out the action repo (read) and sends the release
      # dispatch to it (write) — replacing the former CONTRIBUTORS_PLEASE_ACTION_TOKEN
      # PAT. Skipped when the App isn't configured (e.g. forks): the checkout then
      # falls back to github.token and the notify step fails loudly.
      - name: Mint contributors-please app token for the action repo
        id: action-token
        if: ${{ env.CP_APP_ID != '' }}
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.CONTRIBUTORS_PLEASE_APP_ID }}
          private-key: ${{ secrets.CONTRIBUTORS_PLEASE_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: contributors-please-action
          permission-contents: write

      # Cross-repo checkout of the action repo for the action-output consistency
      # check below. Read-only here; the minted token falls back to github.token
      # for public checkouts.
      - uses: actions/checkout@v6
        with:
          repository: smorinlabs/contributors-please-action
          path: contributors-please-action
          ref: ${{ vars.CONTRIBUTORS_PLEASE_ACTION_REF || 'main' }}
          token: ${{ steps.action-token.outputs.token || github.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "v${PACKAGE_VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version v${PACKAGE_VERSION}" >&2
            exit 1
          fi

      - run: npm ci
      - run: npm test
      - run: npm run schema:codegen
      - run: git diff --exit-code -- src/types
      - run: npm run build
      - run: npm run check:dist-cli
      - run: npm run check:pack
      - run: npm run check:public-api-snapshot
      - run: npm run test:public-api
      - run: node scripts/check-action-outputs.mjs contributors-please-action
      - run: git diff --exit-code -- dist
      - run: npm publish

      - name: Notify contributors-please-action of the release
        # The action repo's engine-sync workflow reacts to this dispatch and
        # flags stale version references immediately instead of at its daily
        # cron. Auth is the contributors-please App token minted above (scoped to
        # the action repo with contents: write). The npm publish already
        # succeeded (and the cron is a backstop), but a failed notification is no
        # longer silently swallowed: scripts/notify-release.mjs prints the exact
        # root cause as a `::error::` annotation and exits non-zero, so this step
        # turns red and is trivially diagnosable. `continue-on-error` is
        # intentionally NOT set.
        env:
          GH_TOKEN: ${{ steps.action-token.outputs.token }}
        run: node scripts/notify-release.mjs
