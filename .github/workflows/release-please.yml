# Release-please workflow for contributors-please (npm-published TS library + CLI).
# Mirrors the canonical pattern from smorinlabs/py-launch-blueprint and the
# sibling smorinlabs/contributors-please-action repo so the three stay parallel.
#
# Opens release PR on push to main; merge of that PR creates a tag + GitHub
# Release, and the tag push fires the existing publish.yml (npm OIDC trusted
# publishing).
#
# Auth uses one of two mechanisms that can BOTH open PRs and trigger downstream
# workflows (publish.yml) — GITHUB_TOKEN is intentionally NOT used as a
# fallback, since it never triggers downstream workflows and may be blocked
# from opening PRs by org policy:
#   1. GitHub App (preferred): set RELEASE_PLEASE_APP_ID + RELEASE_PLEASE_PRIVATE_KEY
#      (App with Contents + Pull requests: write, installed on this repo); the
#      job mints an installation token from them.
#   2. Fallback PAT: set RELEASE_PLEASE_APP_TOKEN (fine-grained PAT, Contents +
#      Pull requests: write).
# See smorinlabs/py-launch-blueprint's RELEASE.md for App setup. With neither
# configured, release-please fails fast.

name: release-please

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: release-please
  cancel-in-progress: false  # never cancel an in-flight release PR

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      # Surfaced so the app-token step's `if:` can test it (secrets are not
      # available directly in `if:` conditions). Empty unless the App is set up.
      RP_APP_ID: ${{ secrets.RELEASE_PLEASE_APP_ID }}
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      pr: ${{ steps.rp.outputs.pr }}
    steps:
      # Mint a GitHub App installation token when the App is configured, so the
      # release PR/tag triggers downstream workflows. Skipped otherwise.
      - name: Mint release-please app token
        id: app-token
        if: ${{ env.RP_APP_ID != '' }}
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_PRIVATE_KEY }}

      - name: release-please
        id: rp
        uses: googleapis/release-please-action@v5.0.0
        with:
          # Minted App installation token (preferred) or the RELEASE_PLEASE_APP_TOKEN
          # PAT — both open PRs and trigger downstream workflows. See RELEASE.md
          # in smorinlabs/py-launch-blueprint.
          token: ${{ steps.app-token.outputs.token || secrets.RELEASE_PLEASE_APP_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # sync-dist job. Mirrors py-launch-blueprint's sync-uv-lock pattern. When
  # release-please opens a release PR that bumps the package version, this job
  # rebuilds dist/ on the PR branch and commits any changes back, so the PR
  # doesn't fail `git diff --exit-code -- dist` (the committed-dist invariant
  # enforced by `npm run check` / ci.yml).
  #
  # Library-specific: `npm run schema:codegen` runs BEFORE `npm run build` so
  # generated src/types/* stays consistent with schemas/*.schema.json — this
  # matches the existing `npm run check` sequence in package.json.
  #
  # Sibling repo smorinlabs/contributors-please-action applies the same pattern
  # without the schema:codegen step.
  sync-dist:
    name: sync-dist
    needs: release-please
    if: ${{ needs.release-please.outputs.pr != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      RP_APP_ID: ${{ secrets.RELEASE_PLEASE_APP_ID }}
    steps:
      # Mint a fresh installation token from the same App (a separate token —
      # steps don't cross jobs) so the dist sync commit pushed to the release
      # PR branch also triggers its CI checks.
      - name: Mint release-please app token
        id: app-token
        if: ${{ env.RP_APP_ID != '' }}
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_PRIVATE_KEY }}

      - name: Checkout release PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ fromJson(needs.release-please.outputs.pr).headBranchName }}
          token: ${{ steps.app-token.outputs.token || secrets.RELEASE_PLEASE_APP_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Regenerate generated types from schemas
        run: npm run schema:codegen

      - name: Rebuild dist
        run: npm run build

      - name: Commit if changed
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          if ! git diff --quiet -- dist src/types; then
            git add dist src/types
            git commit -m "chore: sync generated files (dist + types)"
            git push
          else
            echo "generated files already in sync"
          fi
